<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Foi o Go que me deu</title>
    <link rel="icon" href="/assets/img/icone.png" type="image/svg+xml" />
    <link rel="canonical" href="" id="canonical" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
</head>

<body>
    <div class="container">
        <header></header>

        <main id="post-main" style="display:none">
            <article class="card">
                <div class="meta" id="meta"></div>
                <h1 id="title" style="margin-top:10px;"></h1>
                <div id="content"></div>
            </article>
        </main>

        <main id="notfound-main" style="display:none">
            <section style="text-align: center; padding: 4rem 1rem;">
                <h1>404</h1>
                <p>Página não encontrada.</p>
                <a href="/">Voltar para o início</a>
            </section>
        </main>

        <footer></footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script>Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/';</script>

    <script type="module">
        import { initComponents } from '/assets/js/components.js';
        import { mdToHtml, escapeHtml } from '/assets/js/mdToHtml.js';

        await initComponents();

        // ALTERE AQUI o ID do post que quer testar (veja em data/posts.json)
        const testPostId = 'consistent-hashing-para-sistemas-distribuidos';  // Exemplo: altere para 'o-que-sao-padroes-de-projeto-e-para-que-servem'

        async function loadPosts() {
            const res = await fetch('/data/posts.json');
            if (!res.ok) throw new Error('Não consegui carregar /data/posts.json');
            return await res.json();
        }

        async function loadText(path) {
            const res = await fetch(path);
            if (!res.ok) throw new Error('Não consegui carregar: ' + path);
            return await res.text();
        }

        // parse DD-MM-YYYY, DD/MM/YYYY or YYYY-MM-DD (fallback to Date)
        function parseDateString(s) {
            if (!s) return null;
            const ymd = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (ymd) return new Date(Number(ymd[1]), Number(ymd[2]) - 1, Number(ymd[3]));
            const dmyHyphen = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
            if (dmyHyphen) return new Date(Number(dmyHyphen[3]), Number(dmyHyphen[2]) - 1, Number(dmyHyphen[1]));
            const dmySlash = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if (dmySlash) return new Date(Number(dmySlash[3]), Number(dmySlash[2]) - 1, Number(dmySlash[1]));
            const d = new Date(s);
            return isNaN(d) ? null : d;
        }

        function formatDatePt(s) {
            const d = parseDateString(s);
            if (!d) return s || '';
            const months = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            return `${d.getDate()} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
        }

        async function main() {
            const posts = await loadPosts();
            const post = posts.find(p => p.id === testPostId);
            if (!post) throw new Error('Post não encontrado: ' + testPostId);

            document.title = post.title;
            const canonical = document.getElementById('canonical');
            if (canonical) canonical.href = window.location.href;
            document.getElementById('title').textContent = post.title;
            document.getElementById('meta').innerHTML = `
            Escrito por ${escapeHtml(post.author || 'Autor desconhecido')} em ${formatDatePt(post.date)}
            <span class="badge">${post.category}</span>
          `;

            let mdPath = post.md || `/posts/${testPostId}.md`;
            if (!mdPath.startsWith('/')) mdPath = '/' + mdPath.replace(/^\/+/, '');

            const md = await loadText(mdPath);
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = mdToHtml(md);

            // Prism
            if (window.Prism) {
                if (typeof window.Prism.highlightAllUnder === 'function') {
                    window.Prism.highlightAllUnder(contentEl);
                } else if (typeof window.Prism.highlightAll === 'function') {
                    window.Prism.highlightAll();
                }
            }
        }

        document.getElementById('post-main').style.display = '';
        main().catch(err => {
            console.error(err);
            const content = document.getElementById('content');
            if (content) content.innerHTML = `<div class="card">Erro: ${err.message}</div>`;
            if (window.Prism) Prism.highlightAll();
        });
    </script>
</body>

</html>
